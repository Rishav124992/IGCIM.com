<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADCA Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      padding: 20px;
    }
    #quiz-box {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    h2 {
      margin-bottom: 15px;
    }
    .option {
      display: block;
      margin: 10px 0;
    }
    #next-btn {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #next-btn:hover {
      background-color: #45a049;
    }
    #result {
      font-size: 20px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div id="quiz-box">
    <h2 id="question">Question 1 of 70</h2>
    <div id="options"></div>
    <button id="next-btn">Next</button>
    <div id="result"></div>
  </div>
  <script src="quiz.js"></script>
</body>
</html>
